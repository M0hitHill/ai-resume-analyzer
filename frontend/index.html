<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="theme-color" content="#050816" />

    <title>ResumeIQ — AI Resume Analyzer</title>

    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/themes.css" />
    <link rel="stylesheet" href="styles/layout.css" />
    <link rel="stylesheet" href="styles/components.css" />
    <link rel="stylesheet" href="styles/animations.css" />
    <link rel="stylesheet" href="styles/utilities.css" />
  </head>

  <body>
    <main class="container">
      <section class="card">
        <h1>ResumeIQ</h1>

        <p class="subtitle">
          ATS scoring, keyword analysis, and AI-powered resume feedback for
          modern hiring.
        </p>

        <form enctype="multipart/form-data" id="resume-form" autocomplete="off">
          <div class="form-group">
            <label for="pdf-upload"> Upload Resume PDF </label>

            <input
              type="file"
              id="pdf-upload"
              name="resume"
              accept="application/pdf"
              required
            />
          </div>

          <div class="form-group">
            <label for="job_description"> Job Description </label>

            <textarea
              rows="6"
              maxlength="1000"
              name="job_description"
              placeholder="Paste Job Description"
              id="job_description"
              required
            ></textarea>
          </div>

          <button type="submit" class="primary-btn">Analyze Resume</button>
        </form>
      </section>

      <section id="result" class="result-section" aria-live="polite">
        <div class="empty-state">
          <h3>No Analysis Yet</h3>

          <p>
            Upload your resume and paste a job description to generate ATS
            analysis and AI feedback.
          </p>
        </div>

        <div id="loading" class="loading hidden">
          <div class="spinner"></div>

          <p>Analyzing Resume...</p>
        </div>
      </section>
    </main>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
